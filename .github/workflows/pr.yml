name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        components: rustfmt, clippy
    
    - name: Check formatting
      run: cargo fmt -- --check
    
    - name: Run clippy
      run: cargo clippy -- -D warnings
    
    - name: Check compilation
      run: cargo check --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Run tests
      run: cargo test --all-features
    
    - name: Generate test report
      if: always()
      run: |
        cargo install cargo-test-report
        cargo test -- -Z unstable-options --format json > test-results.json
        cargo test-report --output test-report.html < test-results.json
    
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: test-report
        path: test-report.html

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Security audit
      uses: actions-rs/audit-check@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

  size-check:
    name: WASM Size Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
        target: wasm32-unknown-unknown
    
    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    
    - name: Build WASM
      run: wasm-pack build --target web --out-dir pkg
    
    - name: Check WASM size
      run: |
        WASM_SIZE=$(stat -c%s pkg/plotscript_bg.wasm || stat -f%z pkg/plotscript_bg.wasm)
        echo "WASM size: $WASM_SIZE bytes"
        if [ $WASM_SIZE -gt 524288 ]; then
          echo "::warning::WASM size exceeds 512KB limit"
        fi